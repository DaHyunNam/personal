<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>퍼컬 체크</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, sans-serif;
        background: #f8f4f1;
        padding-bottom: 90px;
      }
      .container {
        padding: 16px;
      }
      .header {
        position: sticky;
        top: 0;
        background: #fff;
        padding: 16px;
        border-radius: 16px;
      }
      .card {
        background: #fff;
        padding: 16px;
        border-radius: 16px;
        margin: 12px 0;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        background: #fff;
      }
      .nav-btn {
        flex: 1;
        padding: 16px;
        border: none;
      }
      .nav-btn.active {
        background: #8d6e63;
        color: #fff;
      }
      textarea {
        width: 100%;
        min-height: 100px;
        margin-top: 10px;
      }
      input[type="checkbox"] {
        transform: scale(1.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"><h2>웨딩 퍼컬 체크</h2></div>
      <div id="questions" class="section active"></div>
      <div id="answers" class="section"></div>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn active" onclick="show('questions', this)">
        질문</button
      ><button class="nav-btn" onclick="show('answers', this)">답변</button>
    </div>
    <script>
      const items = [
        "피해야 할 색",
        "촬영/본식 메이크업 차이",
        "화이트톤 추천",
        "드레스 소재",
        "헤어변형 3가지",
        "장식 추천",
        "네일 추천",
        "고급 키워드 3개",
      ];
      function render() {
        questions.innerHTML = items
          .map(
            (q, i) =>
              `<div class='card' onclick='jump(${i})'><label><input type=checkbox> ${q}</label></div>`,
          )
          .join("");
        answers.innerHTML = items
          .map(
            (q, i) =>
              `<div class='card' id='a${i}'><b>${q}</b><textarea placeholder='답변 입력'></textarea></div>`,
          )
          .join("");
      }
      function show(id, btn) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }
      function jump(i) {
        show("answers", document.querySelectorAll(".nav-btn")[1]);
        setTimeout(() => {
          document
            .getElementById("a" + i)
            .scrollIntoView({ behavior: "smooth" });
          document.querySelector("#a" + i + " textarea").focus();
        }, 150);
      }
      render();
    </script>
  </body>
</html>
